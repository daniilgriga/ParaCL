name: CI

on:
  push:
    branches: [dev, main, feat/**, chore/**, fix/**]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ubuntu:
    name: Ubuntu (GCC Debug)
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 30
    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 1
      CTEST_PARALLEL_LEVEL: 1

    steps:
      - uses: actions/checkout@v4

      - name: Show runner info
        run: |
          whoami
          uname -a
          cmake --version
          ninja --version
          g++ --version

      - name: Configure
        run: >
          cmake -S . -B build/ubuntu
          -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build/ubuntu -- -j1

      - name: Unit tests
        run: ctest --test-dir build/ubuntu --output-on-failure -j1

      - name: E2E tests
        run: ./tests/e2e/run_e2e.sh ./build/ubuntu/paracli

  build-ubuntu-sanitizers:
    name: Ubuntu (GCC + Sanitizers)
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: [self-hosted, Linux, X64]
    needs: build-ubuntu
    timeout-minutes: 40
    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 1
      CTEST_PARALLEL_LEVEL: 1

    steps:
      - uses: actions/checkout@v4

      - name: Configure with sanitizers
        run: >
          cmake -S . -B build/ubuntu-sanitize
          -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DBUILD_TESTS=ON
          -DSANITIZE=ON

      - name: Build
        run: cmake --build build/ubuntu-sanitize -- -j1

      - name: Unit tests
        run: ctest --test-dir build/ubuntu-sanitize --output-on-failure -j1

      - name: E2E tests
        run: ./tests/e2e/run_e2e.sh ./build/ubuntu-sanitize/paracli

  build-ubuntu-release:
    name: Ubuntu (GCC Release)
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: [self-hosted, Linux, X64]
    needs: build-ubuntu-sanitizers
    timeout-minutes: 30
    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 1
      CTEST_PARALLEL_LEVEL: 1

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build/release
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build/release -- -j1

      - name: Unit tests
        run: ctest --test-dir build/release --output-on-failure -j1

      - name: E2E tests
        run: ./tests/e2e/run_e2e.sh ./build/release/paracli

  build-macos:
    name: macOS (Clang)
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: macos-latest
    needs: build-ubuntu-release
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja googletest bison flex

      - name: Prefer Homebrew bison in PATH
        run: echo "$(brew --prefix bison)/bin" >> $GITHUB_PATH

      - name: Configure
        run: >
          cmake -S . -B build/macos
          -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DBUILD_TESTS=ON

      - name: Build
        run: cmake --build build/macos

      - name: Unit tests
        run: ctest --test-dir build/macos --output-on-failure

      - name: E2E tests
        run: ./tests/e2e/run_e2e.sh ./build/macos/paracli
